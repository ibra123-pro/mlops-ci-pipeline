name: CI
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
env:
  CSV_URL: "MLproject/train_pca.csv"
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3
 
      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL
 
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
      
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run . --env-manager=local 
 
      # Save models to GitHub Repository
      - name: Save mlruns to repo
        env:
          GIT_NAME: ${{ secrets.username }}
          GIT_EMAIL: ${{ secrets.email }}
        run: |
          # Memberikan nilai default jika secret kosong agar tidak error
          git config --global user.name "${GIT_NAME:-ibra123-pro}"
          git config --global user.email "${GIT_EMAIL:-achmadibrahim21@gmail.com}"
          
          # Tambahkan mlruns
          git add mlruns/
          
          # Hanya commit jika ada perubahan (agar tidak error jika tidak ada file baru)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Save mlruns from CI run [skip ci]"
            # Gunakan 'main' jika itu branch utama Anda
            git push origin main
          else
            echo "No changes to commit"
          fi

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}' # Harus sama dengan nama di GitHub
